<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <title>Quiniela - Mundial 2026</title>
</head>

<body>
    <div id="sidebar-container"></div>
    <main class="main-content">

            <!-- ENCABEZADO DE BIENVENIDA -->
            <div class="page-header">
                <div>
                    <h2 id="txtBienvenidaDashboard">👋 ¡Bienvenido!</h2>
                    <p>Resumen general de tu actividad en la Quiniela Mundial 2026</p>
                </div>
            </div>

            <!-- 📊 REJILLA DE TARJETAS CON EFECTO GLOW (DASHBOARD) -->
            <div class="grid-resumen-cards">
                <div class="card-resumen border-posicion">
                    <div class="card-icon-wrapper"><i class="fa-solid fa-trophy"></i></div>
                    <div>
                        <span class="card-label">Tu Posición</span>
                        <strong class="card-value text-glow-green" id="dashPosicion">#--</strong>
                    </div>
                </div>
                <div class="card-resumen border-puntos">
                    <div class="card-icon-wrapper"><i class="fa-solid fa-star"></i></div>
                    <div>
                        <span class="card-label">Tus Puntos</span>
                        <strong class="card-value" id="dashPuntos">0</strong>
                    </div>
                </div>
                <div class="card-resumen border-partidos">
                    <div class="card-icon-wrapper"><i class="fa-solid fa-chart-simple"></i></div>
                    <div>
                        <span class="card-label">Tus Aciertos</span>
                        <strong class="card-value" id="dashAciertos">0</strong>
                    </div>
                </div>
                <div class="card-resumen border-participantes">
                    <div class="card-icon-wrapper"><i class="fa-solid fa-users"></i></div>
                    <div>
                        <span class="card-label">Participantes</span>
                        <strong class="card-value" id="dashParticipantes">0</strong>
                    </div>
                </div>
            </div>

            <!-- 📋 PANEL DE LA TABLA GENERAL RÁPIDA -->
            <div class="tabla-general-container" style="max-width: 500px;">
                <div class="tabla-header-actions">
                    <h3>Tabla General</h3>
                </div>

                <div class="tabla-scroll-wrapper">
                    <!-- Encabezados rápidos -->
                    <div class="tabla-head-row-avanzada" style="grid-template-columns: 50px 2fr 1fr;">
                        <div>#</div>
                        <div>Usuario</div>
                        <div class="text-right">Puntos</div>
                    </div>

                    <!-- Contenedor dinámico de filas rápidas para tus amigos -->
                    <div id="dashTablaRows"></div>
                </div>
            </div>
    </main>
    <script src="./js/config.js"></script>
    <script src="./js/layout.js"></script>
    <script src="./js/index.js"></script>
    <script src="./js/app.js"></script>
</body>

</html>
