<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/login.css">
    <title>Recuperar Contraseña</title>
</head>

<body>
    <!-- Reutiliza las clases de tu login actual para que se vea idéntico -->
    <div class="login-card">

        <div class="login-header">
            <h1>Cambiar Contraseña</h1>
        </div>

        <form>
            <!-- Campo Correo -->
            <div class="inputbox-login">
                <input id="correo" type="email" placeholder="Correo electrónico" required="required">
            </div>
            <!-- Campo Nueva Contraseña -->
            <div class="inputbox-pass">
                <input id="password" type="password" placeholder="Contraseña" required="required">
            </div>
            <div class="input-group" style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.2rem;">
                <label style="color: #b8c2d6; font-weight: bold; font-size: 0.9rem;">Respuesta a tu Pregunta
                    Secreta:</label>
                <input type="text" id="forgotRespuesta" placeholder="Escribe tu respuesta de seguridad"
                    autocomplete="off"
                    style="width: 100%; padding: .8rem; background: #05101a; border: 1px solid rgba(255,255,255,.12); border-radius: 10px; color: white; outline: none;">
            </div>
            <div>
                <p id="mensajeForgot" class="mensaje"></p>
                <input class="btn-entrar" type="button" value="Actualizar Contraseña">
            </div>
            <!-- Enlace de regreso -->
            <div class="registro">
                <a href="login.html">Regresar al Login</a>
            </div>
        </form>
        <div style="padding: .8rem 1rem; border-top: 1px solid rgba(255,255,255,.06); margin-top: auto;">
            <p style="margin:0; font-size:.65rem; color:rgba(255,255,255,.25); text-align:center; line-height:1.5;">
                © 2026 Quiniela Mundial<br>
                <span style="color:rgba(46,204,113,.4);">Powered by ZamTech Data Engine</span>
            </p>
        </div>
    </div>
    <script src="./js/config.js"></script>
    <script src="./js/forgot.js"></script>
    <!-- <script src="./js/app.js"></script> -->
</body>

</html>
